<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Resume Tailor</title>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-file-text"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      </div>
      <h1>Resume Tailor</h1>
    </header>

    <div class="form-group">
      <label for="apiKey">Gemini API Key</label>
      <div class="input-row">
        <input type="password" id="apiKey" placeholder="AIzaSy...">
        <button id="saveKeyBtn" class="btn-secondary">Save</button>
      </div>
      <div id="keyStatus" class="status-msg"></div>
    </div>

    <div class="form-group">
      <label for="resumeFile">Upload Current Resume</label>
      <div class="file-upload-wrapper">
        <input type="file" id="resumeFile" accept=".pdf,.docx">
        <div class="file-upload-ui">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          <span id="fileNameDisplay">Choose .pdf or .docx file</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="jobDesc">Job Description</label>
      <textarea id="jobDesc" placeholder="Paste the target job description here..." rows="5"></textarea>
    </div>

    <button id="generateBtn" class="btn-primary">
      <span>Tailor Resume</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </button>

    <div id="statusSection" class="status-section hidden">
      <div id="statusBadge" class="status-badge">
        <div class="spinner"></div>
      </div>
      <p id="statusText">Processing...</p>
    </div>
  </div>

  <script src="libs/pdf.min.js"></script>
  <script src="libs/mammoth.browser.min.js"></script>
  <script src="libs/jspdf.umd.min.js"></script>
  
  <script src="utils/pdfParser.js"></script>
  <script src="utils/docxParser.js"></script>
  <script src="utils/geminiClient.js"></script>
  <script src="utils/pdfGenerator.js"></script>
  <script src="env.js"></script>
  <script src="popup.js"></script>
</body>
</html>
